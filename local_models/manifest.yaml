# HF repos for local vLLM/TGI weights. Sizes are measured at download time; greedy pack
# fills up to budget_gb. MiniMax (~214 GiB) + gpt-oss-120b (~182 GiB) need ~396 GiB total.

version: 1
budget_gb: 420
max_workers: 64

repos:
  - id: MiniMaxAI/MiniMax-M2.5
    priority: 10
  - id: openai/gpt-oss-120b
    priority: 20
