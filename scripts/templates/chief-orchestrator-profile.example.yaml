# Example Hermes profile layout for a VPS "chief-orchestrator" instance.
#
# 1. From repo: ./scripts/droplet_bootstrap_chief_orchestrator.sh
#    (or: ./venv/bin/hermes profile create chief-orchestrator && ./venv/bin/hermes profile use chief-orchestrator)
#    Bootstrap also runs ./scripts/ensure_chief_orchestrator_profile_env.sh so the profile has
#    its own ~/.hermes/profiles/chief-orchestrator/.env (Hermes loads only HERMES_HOME/.env).
#    Use ./venv/bin/hermes — bare `hermes` is not on PATH unless you add venv/bin.
# 2. Merge this into ~/.hermes/profiles/chief-orchestrator/config.yaml
# 3. Put OPENROUTER_API_KEY in that profile's ~/.hermes/profiles/chief-orchestrator/.env
#
# Token / model governance (Session 6+): do **not** hardcode expensive OpenRouter slugs here.
# - Copy scripts/templates/hermes_token_governance.runtime.example.yaml to
#   HERMES_HOME/workspace/operations/hermes_token_governance.runtime.yaml
# - Edit **tier_models** (A–F) there when pricing changes; keep policy alignment with
#   workspace/operations/MODEL_ROUTING_REGISTRY.md
# - Use **tier:D**, **tier:B**, **tier:C** placeholders below; Hermes resolves them at
#   load_config() time. Each user turn can log "Token governance: this turn Tier X → …"
#   when dynamic_tier_routing is enabled in that YAML.
#
# `scripts/agent-droplet` uses the workstation sticky profile name on the VPS (HERMES_HOME=.../profiles/<name>);
# if sticky is default/missing it uses chief-orchestrator. Trailing `droplet` on the CLI is not a profile.

model:
  provider: openrouter
  default: tier:D

compression:
  summary_provider: openrouter
  summary_model: tier:B

auxiliary:
  vision:
    provider: openrouter
    model: tier:B
  web_extract:
    provider: openrouter
    model: tier:B
  compression:
    provider: openrouter
    model: tier:B
  session_search:
    provider: openrouter
    model: tier:B
  skills_hub:
    provider: openrouter
    model: tier:B
  approval:
    provider: openrouter
    model: tier:B
  mcp:
    provider: openrouter
    model: tier:B
  flush_memories:
    provider: openrouter
    model: tier:B

delegation:
  provider: openrouter
  model: tier:C

# Skip dangerous-terminal approval prompts (gateway + CLI). Same effect as HERMES_YOLO_MODE.
# Set to manual/smart when you want interactive approvals again.
approvals:
  mode: off
